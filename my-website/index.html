<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cineflex - Premium Streaming</title>
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">CINEFLEX</div>
</nav>

<header class="banner" id="banner">
  <div class="banner-content">
    <h1 id="banner-title">Loading...</h1>
    <p id="banner-desc"></p>
    <button class="play-btn" onclick="showBannerDetails()"><i class="fa-solid fa-play"></i> Watch Now</button>
  </div>
  <div class="banner-fade"></div>
</header>

<div class="genre-tabs">
    <button class="tab-btn active" onclick="scrollToSection('trending-today', this)">Trending</button>
    <button class="tab-btn" onclick="scrollToSection('anime-list', this)">Anime</button>
    <button class="tab-btn" onclick="scrollToSection('kdrama-list', this)">K-Drama</button>
    <button class="tab-btn" onclick="scrollToSection('filipino-list', this)">Vivamax</button>
</div>

<main class="content">
    <section class="row" id="trending-today">
        <h2>Trending Today</h2>
        <div class="scroller" id="trending-today-list"></div>
    </section>
    
    <section class="row" id="anime-list">
        <h2>Latest Anime</h2>
        <div class="scroller" id="anime-list-inner"></div>
    </section>
    
    <section class="row" id="kdrama-list">
        <h2>Korean Dramas</h2>
        <div class="scroller" id="kdrama-list-inner"></div>
    </section>

    <section class="row" id="filipino-list">
        <h2>Vivamax Hits</h2>
        <div class="scroller" id="filipino-list-inner"></div>
    </section>
</main>

<div id="details-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-banner" id="modal-banner"><span class="close-modal" onclick="closeModal()">&times;</span></div>
      <div class="modal-body">
        <div id="modal-player-container" class="modal-player-wrapper">
            <div style="position:relative; padding-bottom:56.25%; height:0;">
                <iframe id="modal-video-iframe" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" src="" allowfullscreen></iframe>
            </div>
        </div>
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
        <div id="movie-play-action">
            <button class="play-btn-large" onclick="startPlayback()"><i class="fa-solid fa-play"></i> Play Movie</button>
        </div>
      </div>
    </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fa-solid fa-house"></i><span>Home</span></div>
  <div class="nav-item" onclick="alert('Search Coming Soon')"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></div>
  <div class="nav-item" onclick="alert('Menu Coming Soon')"><i class="fa-solid fa-bars"></i><span>Menu</span></div>
</div>

<script src="home.js"></script>
</body>
</html>
