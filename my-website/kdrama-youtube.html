<!doctype html>
<html lang="fil">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080b12">
  <title>K-Drama Tagalog Dub | CineFlex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="kdrama-youtube.css">
</head>
<body>
  <header class="topbar">
    <button class="icon-btn" onclick="history.back()" aria-label="Bumalik"><i class="fa-solid fa-arrow-left"></i></button>
    <div><strong>CINEFLEX</strong><span>K-Drama Tagalog Dub</span></div>
    <button id="refreshBtn" class="icon-btn" aria-label="I-refresh"><i class="fa-solid fa-rotate"></i></button>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <span class="eyebrow">YOUTUBE COLLECTION</span>
        <h1>Korean Drama<br><em>Tagalog Dub</em></h1>
        <p>Available public YouTube episodes at movies na puwedeng i-embed. Ang availability ay nakadepende sa uploader at YouTube.</p>
      </div>
    </section>

    <section class="toolbar">
      <label class="searchbox"><i class="fa-solid fa-magnifying-glass"></i><input id="searchInput" placeholder="Search title, channel, episode..."></label>
      <select id="sortSelect" aria-label="Ayusin">
        <option value="newest">Newest</option>
        <option value="views">Most viewed</option>
        <option value="longest">Longest</option>
        <option value="title">Title A–Z</option>
      </select>
    </section>

    <div id="notice" class="notice" hidden></div>
    <div id="stats" class="stats">Loading catalog…</div>
    <section id="grid" class="grid" aria-live="polite"></section>
    <button id="loadMoreBtn" class="load-more" hidden>Load more results</button>
  </main>

  <div id="playerModal" class="player-modal" hidden>
    <div class="player-shell">
      <div class="player-head">
        <button id="closePlayer" class="player-back-btn" type="button" aria-label="Bumalik sa listahan"><i class="fa-solid fa-arrow-left"></i> Back to Episodes</button>
        <strong id="playerTitle">Now Playing</strong>
      </div>
      <div class="video-wrap"><iframe id="ytPlayer" title="YouTube player" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe></div>
      <div class="player-actions">
        <button id="prevBtn"><i class="fa-solid fa-backward-step"></i> Previous</button>
        <a id="youtubeLink" target="_blank" rel="noopener"><i class="fa-brands fa-youtube"></i> Open YouTube</a>
        <button id="nextBtn">Next <i class="fa-solid fa-forward-step"></i></button>
      </div>
    </div>
  </div>

  <script src="youtube-kdrama-config.js"></script>
  <script src="kdrama-youtube.js"></script>
</body>
</html>
