<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CineFlex Profiles</title>

<link rel="stylesheet" href="profiles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- MAIN PROFILE SELECT SCREEN -->
<div id="profile-selector" class="profile-selector">

    <div class="profile-box">

        <h1>Who's Watching?</h1>

        <div id="profiles" class="profiles">
            <!-- JS renders profiles here -->
        </div>

        <button onclick="createProfile()">
            + Add Profile
        </button>

    </div>

</div>

<!-- MAIN APP WRAPPER (for future use / home redirect system) -->
<div id="app-wrapper"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="profiles.js"></script>

</body>
</html>
