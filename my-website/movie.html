<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Now - Cineflex</title>
  <link rel="stylesheet" href="home.css?v=1.1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .player-page-container { max-width: 1200px; margin: 80px auto padding: 20px; color: #fff; }
    .player-wrapper { width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .iframe-container { position: relative; padding-bottom: 56.25%; height: 0; }
    .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .server-tabs { display: flex; gap: 10px; margin: 15px 0; justify-content: flex-start; }
    .server-btn { background: #222; color: #ccc; border: 1px solid #444; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .server-btn.active { background: #e50914; color: #fff; border-color: #e50914; }
    .movie-details h1 { font-size: 2rem; margin: 10px 0; }
    .movie-details p { color: #aaa; line-height: 1.6; }
    .episode-section { margin-top: 30px; }
    .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
    .ep-card { background: #1c1c1c; padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid #333; text-align: center; transition: 0.3s; }
    .ep-card:hover, .ep-card.active { background: #e50914; color: white; border-color: #e50914; }
  </style>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">CINEFLEX</div>
</nav>

<div class="player-page-container">
    <div class="player-wrapper">
        <div class="iframe-container">
            <iframe id="video-player" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div class="server-tabs">
        <button id="srv1-btn" class="server-btn active" onclick="switchServer(1)">Server 1</button>
        <button id="srv2-btn" class="server-btn" onclick="switchServer(2)">Server 2</button>
    </div>

    <div class="movie-details">
        <h1 id="movie-title">Loading Title...</h1>
        <p id="movie-desc">Loading description...</p>
    </div>

    <div id="tv-episode-section" class="episode-section" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Episodes</h3>
            <select id="season-select" onchange="loadEpisodes(this.value)" style="padding: 5px; background: #222; color: #fff; border: 1px solid #444;"></select>
        </div>
        <div id="episode-list" class="episode-list"></div>
    </div>
</div>

<script src="https://bashsecret.com/03/53/7d/03537deb3b1a6012bf51de011865aed1.js" type="text/javascript"></script>

<script>
    const API_KEY = "742aa17a327005b91fb6602054523286";
    const BASE_URL = "https://api.themoviedb.org/3";
    const SERVER_1_URL = "https://zxcstream.xyz";
    const SERVER_2_URL = "https://zxcstream.xyz";

    const urlParams = new URLSearchParams(window.location.search);
    const mediaId = urlParams.get('id');
    const mediaType = urlParams.get('type');

    let currentSeason = 1;
    let currentEpisode = 1;
    let activeServer = 1;

    async function loadMediaDetails() {
        if (!mediaId || !mediaType) return;
        
        try {
            const res = await fetch(`${BASE_URL}/${mediaType}/${mediaId}?api_key=${API_KEY}`).then(r => r.json());
            document.getElementById("movie-title").innerText = res.title || res.name;
            document.getElementById("movie-desc").innerText = res.overview || "No overview available.";

            if (mediaType === 'tv') {
                document.getElementById("tv-episode-section").style.display = "block";
                const seasonSelect = document.getElementById("season-select");
                seasonSelect.innerHTML = res.seasons.filter(s => s.season_number > 0)
                    .map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
                loadEpisodes(1);
            } else {
                updatePlayer();
            }
        } catch(err) { console.error(err); }
    }

    async function loadEpisodes(seasonNum) {
        currentSeason = seasonNum;
        try {
            const data = await fetch(`${BASE_URL}/tv/${mediaId}/season/${seasonNum}?api_key=${API_KEY}`).then(r => r.json());
            const epList = document.getElementById("episode-list");
            epList.innerHTML = data.episodes.map(e => `
                <div class="ep-card ${e.episode_number === currentEpisode ? 'active' : ''}" onclick="playEpisode(${e.episode_number})">
                    Ep. ${e.episode_number} - ${e.name.substring(0, 15)}...
                </div>`).join('');
            if(data.episodes.length > 0) playEpisode(1);
        } catch(err) { console.error(err); }
    }

    function playEpisode(epNum) {
        currentEpisode = epNum;
        document.querySelectorAll('.ep-card').forEach((el, index) => {
            el.classList.toggle('active', index + 1 === epNum);
        });
        updatePlayer();
    }

    function updatePlayer() {
        const iframe = document.getElementById("video-player");
        const baseUrl = activeServer === 1 ? SERVER_1_URL : SERVER_2_URL;
        
        if (mediaType === 'tv') {
            iframe.src = `${baseUrl}/player/tv/${mediaId}/${currentSeason}/${currentEpisode}?dubLang=tl&dubType=0`;
        } else {
            iframe.src = `${baseUrl}/player/movie/${mediaId}?dubLang=tl&dubType=0`;
        }
    }

    function switchServer(serverNum) {
        activeServer = serverNum;
        document.getElementById("srv1-btn").classList.toggle("active", serverNum === 1);
        document.getElementById("srv2-btn").classList.toggle("active", serverNum === 2);
        updatePlayer();
    }

    loadMediaDetails();
</script>
</body>
</html>
