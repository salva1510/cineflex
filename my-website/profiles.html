<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cineflex Profiles</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{

margin:0;
background:#141414;
font-family:Arial;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

color:white;

}

.wrapper{

text-align:center;

}

h1{

font-size:42px;
margin-bottom:50px;

}

#profiles{

display:flex;

gap:40px;

flex-wrap:wrap;

justify-content:center;

}

.profile{

cursor:pointer;

transition:.3s;

}

.profile:hover{

transform:scale(1.08);

}

.profile img{

width:150px;

height:150px;

border-radius:8px;

border:4px solid transparent;

}

.profile:hover img{

border-color:white;

}

.profile p{

font-size:20px;

}

.add{

width:150px;

height:150px;

display:flex;

justify-content:center;

align-items:center;

font-size:70px;

background:#222;

border-radius:8px;

}

</style>

</head>

<body>

<div class="wrapper">

<h1>Who's Watching?</h1>

<div id="profiles"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="profiles.js"></script>

</body>

</html>
