<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <title>CineFlex Details</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="details.css?v=3.1">
</head>
<body>
  <div id="heroBackdrop" class="hero-backdrop"></div>
  <header class="details-header">
    <button id="backBtn" class="round-btn" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></button>
    <img src="cineflex-header-logo.png" alt="CineFlex" class="details-logo">
    <button id="homeBtn" class="round-btn" aria-label="Home"><i class="fa-solid fa-house"></i></button>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <p class="eyebrow">CINEFLEX ORIGINAL EXPERIENCE</p>
        <h1 id="title">Loading…</h1>
        <div id="meta" class="meta"></div>
        <p id="overview" class="overview">Loading title information…</p>
        <div class="actions">
          <button id="playBtn" class="primary"><i class="fa-solid fa-play"></i> Play Now</button>
          <button id="trailerBtn"><i class="fa-brands fa-youtube"></i> Trailer</button>
          <button id="listBtn"><i class="fa-solid fa-plus"></i> My List</button>
        </div>
      </div>
      <img id="poster" class="poster" alt="Poster">
    </section>

    <section class="content-shell">
      <div class="main-column">
        <section class="panel">
          <p class="eyebrow">ABOUT THIS TITLE</p>
          <h2>Story & Details</h2>
          <div id="facts" class="facts"></div>
        </section>
        <section id="episodesSection" class="panel" hidden>
          <div class="section-head"><div><p class="eyebrow">TV SERIES</p><h2>Episodes</h2></div><select id="seasonSelect"></select></div>
          <div id="episodeGrid" class="episode-grid"></div>
        </section>
        <section class="panel">
          <p class="eyebrow">CAST</p><h2>Top Cast</h2>
          <div id="castGrid" class="cast-grid"></div>
        </section>
        <section class="panel">
          <p class="eyebrow">MORE LIKE THIS</p><h2>Recommended for You</h2>
          <div id="recommendGrid" class="recommend-grid"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="trailerModal" class="trailer-modal" hidden>
    <button id="closeTrailer" class="trailer-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
    <div class="trailer-frame"><iframe id="trailerFrame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe></div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="firebase.js?v=9.0.300"></script>
  <script src="js/core/plugin-engine3007.js?v=301.0"></script>
  <script src="js/core/play-action-ads3009.js?v=301.4"></script>
  <script src="details.js?v=301.4"></script>
</body>
</html>
