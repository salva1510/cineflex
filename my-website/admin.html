<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cineflex Admin</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

</head>

<body>

<div class="sidebar">

<h2>CINEFLEX</h2>

<div class="menu">

<div class="item" onclick="showPage('dashboard')">
<i class="fa fa-chart-line"></i>
Dashboard
</div>

<div class="item" onclick="showPage('movies')">
<i class="fa fa-film"></i>
Movies
</div>

<div class="item" onclick="showPage('banner')">
<i class="fa fa-image"></i>
Banner
</div>

<div class="item" onclick="showPage('users')">
<i class="fa fa-users"></i>
Users
</div>

<div class="item" onclick="showPage('settings')">
<i class="fa fa-gear"></i>
Settings
</div>

</div>

</div>

<div class="content">

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h2 id="totalUsers">0</h2>
<p>Total Users</p>
</div>

<div class="card">
<h2 id="totalMovies">0</h2>
<p>Total Movies</p>
</div>

<div class="card">
<h2 id="totalProfiles">0</h2>
<p>Profiles</p>
</div>

</div>

</div>

<div id="movies" class="page" style="display:none">

<h1>Movies</h1>

<button onclick="addMovie()">
Add Movie
</button>

<div id="movieList"></div>

</div>

<div id="banner" class="page" style="display:none">

<h1>Banner Manager</h1>

<input id="bannerTitle"
placeholder="Banner Title">

<br><br>

<button onclick="saveBanner()">

Save Banner

</button>

</div>

<div id="users" class="page" style="display:none">

<h1>Users</h1>

<div id="userList"></div>

</div>

<div id="settings" class="page" style="display:none">

<h1>Settings</h1>

<button onclick="maintenanceMode()">

Toggle Maintenance

</button>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
