<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CineFlex Profiles</title>

<link rel="stylesheet" href="profiles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- MAIN PROFILE SELECT SCREEN -->
<div id="profile-selector" class="profile-selector">

    <div class="profile-box">

        <h1>Who's Watching?</h1>

        <div id="profiles" class="profiles">
            <!-- JS renders profiles here -->
        </div>

        <button onclick="createProfile()">
            + Add Profile
        </button>

    </div>

</div>
    
<div class="profile-container">
    <div class="profile-card">
        <img src="icon-192.png" alt="Profile 1">
        <p>Juan Dela Cruz</p>
    </div>
    <div class="profile-card">
        <img src="icon-192.png" alt="Profile 2">
        <p>Guest</p>
    </div>
</div>

<!-- MAIN APP WRAPPER (for future use / home redirect system) -->
<div id="app-wrapper"></div>
    
<div id="addProfileModal" class="profile-modal hidden">
    <div class="profile-modal-content">
        <h2>Add Profile</h2>

        <input
            type="text"
            id="newProfileName"
            placeholder="Profile name"
            maxlength="20">

        <label class="kids-option">
            <input type="checkbox" id="kidsProfile">
            Kids Profile
        </label>

        <div class="modal-buttons">
            <button onclick="closeAddProfile()">Cancel</button>
            <button onclick="saveProfile()">Create</button>
        </div>
    </div>
</div>
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="profiles.js"></script>

</body>
</html>
