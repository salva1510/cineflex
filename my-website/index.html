<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cineflex - Premium Streaming</title>
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    .scrolling-text-container { background: #1a1a1a; color: #ffcc00; overflow: hidden; white-space: nowrap; padding: 10px 0; font-family: sans-serif; font-weight: bold; border-bottom: 2px solid #333; }
    .scrolling-text-inner { display: inline-block; padding-left: 100%; animation: scroll-left 25s linear infinite; }
    @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

    .fullscreen-btn { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; padding: 6px 16px; cursor: pointer; backdrop-filter: blur(4px); display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    #gesture-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 150; color: white; background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 12px; display: none; font-size: 1.5rem; pointer-events: none; text-align: center; }
    #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 5; }
    
    .cast-scroller { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
    .cast-card { flex: 0 0 80px; text-align: center; }
    .cast-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #e50914; }
    .cast-card p { font-size: 0.7rem; margin-top: 5px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (orientation: landscape) { .fullscreen-btn { display: none !important; } }
  </style>
</head>
<body>

<div class="scrolling-text-container">
    <div class="scrolling-text-inner"><span>🚀 Welcome to CineFlex! 🍿 Credits To Salva 🚀 Donate: Gcash: 09365028152 🍿 Happy Watching! 🍿</span></div>
</div>

<nav class="navbar">
    <div class="logo">CINEFLEX</div>
    <div class="nav-icons"><i class="fa-solid fa-magnifying-glass" onclick="openSearch()"></i></div>
</nav>

<header class="banner" id="banner">
  <div class="banner-content">
    <h1 id="banner-title">Loading...</h1>
    <p id="banner-desc"></p>
    <button class="play-btn" onclick="showBannerDetails()"><i class="fa-solid fa-play"></i> Watch Now</button>
  </div>
  <div class="banner-fade"></div>
</header>

<main class="content">
    <section class="row" id="continue-watching-section" style="display:none;">
        <h2>Continue Watching</h2>
        <div class="scroller" id="continue-list"></div>
    </section>
    <section class="row"><h2>Trending Today</h2><div class="scroller" id="trending-today"></div></section>
    <section class="row"><h2>Kids & Family</h2><div class="scroller" id="kids-list"></div></section>
    <section class="row"><h2>Latest Anime</h2><div class="scroller" id="anime-list"></div></section>
    <section class="row"><h2>Vivamax / Filipino</h2><div class="scroller" id="filipino-list"></div></section>
</main>

<div id="details-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-banner" id="modal-banner"><span class="close-modal" onclick="closeModal()">&times;</span></div>
      <div class="modal-body">
        
        <div id="modal-player-container" class="modal-player-wrapper" style="position: relative; overflow: hidden; background: #000; display:none;">
            <div id="brightness-overlay"></div>
            <button class="fullscreen-btn" onclick="enterCinemaMode()"><i class="fa-solid fa-expand"></i> Fullscreen Mode</button>
            <div id="gesture-indicator"><i id="gesture-icon"></i><div id="gesture-value"></div></div>
            <div style="position:relative; padding-bottom:56.25%; height:0;">
                <iframe id="modal-video-iframe" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" src="" allowfullscreen></iframe>
            </div>
        </div>

        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>

        <div id="movie-play-action" class="modal-actions"><button class="play-btn-large" onclick="startPlayback()"><i class="fa-solid fa-play"></i> Play Movie</button></div>

        <div id="episode-selector" style="display:none;">
            <select id="season-select" onchange="loadEpisodes(currentItem.id, this.value)"></select>
            <div id="episode-list" class="episode-list-container"></div>
        </div>

        <div class="modal-row" style="margin-top:20px;">
            <h3 style="font-size:1.1rem; border-left:4px solid #e50914; padding-left:10px;">Top Cast</h3>
            <div id="modal-cast" class="cast-scroller"></div>
        </div>

        <div class="modal-row" style="margin-top:20px;">
            <h3 style="font-size:1.1rem; border-left:4px solid #e50914; padding-left:10px;">More Like This</h3>
            <div id="modal-recommendations" class="scroller"></div>
        </div>
      </div>
    </div>
</div>

<div id="search-overlay" class="search-overlay" style="display:none;">
    <div class="search-input-wrapper">
        <input type="text" id="searchInput" placeholder="Search..." oninput="processSearch(this.value)">
        <i class="fa-solid fa-xmark" onclick="closeSearch()"></i>
    </div>
    <div id="search-results" class="search-results-grid"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fa-solid fa-house"></i><span>Home</span></div>
  <div class="nav-item" onclick="openSearch()"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></div>
  <div class="nav-item"><i class="fa-solid fa-bars"></i><span>Menu</span></div>
</div>

<script src="home.js"></script>
</body>
</html>
