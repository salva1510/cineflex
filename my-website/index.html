<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cineflex - Premium Streaming</title>
  <link rel="stylesheet" href="home.css?v=1.1">
<script src="home.js?v=1.1"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* Scrolling Text */
    .scrolling-text-container { background: #1a1a1a; color: #ffcc00; overflow: hidden; white-space: nowrap; padding: 10px 0; font-family: sans-serif; font-weight: bold; border-bottom: 2px solid #333; }
    .scrolling-text-inner { display: inline-block; padding-left: 100%; animation: scroll-left 25s linear infinite; }
    @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

    /* Modal & List Styles */
    .episode-list-container, .mini-recommendation-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body onload="init()">

<nav class="navbar" id="navbar">
    <div class="logo">CINEFLEX</div>
    <div class="nav-icons">
        <i class="fa-solid fa-magnifying-glass" onclick="openSearch()"></i>
        <i class="fa-solid fa-bars" onclick="openMenuDrawer()"></i>
    </div>
</nav>

<header class="banner" id="main-banner">
    <div class="banner-content">
        <h1 id="banner-title">Loading...</h1>
        <p id="banner-desc"></p>
        <div class="banner-buttons">
            <button class="play-btn" onclick="openBannerDetails()"><i class="fa-solid fa-play"></i> Play</button>
            <button class="info-btn" onclick="openBannerDetails()"><i class="fa-solid fa-circle-info"></i> More Info</button>
        </div>
    </div>
    <div class="banner-fade"></div>
</header>

<main class="content">
    <section class="row">
        <h2 class="row-title">Top 10 Today</h2>
        <div class="top10-scroller" id="top10-list"></div>
    </section>

    <section class="row" id="continue-watching-section" style="display:none;">
        <h2 class="row-title">Continue Watching</h2>
        <div class="scroller" id="continue-list"></div>
    </section>

    <section class="row">
        <h2 class="row-title">Trending Today</h2>
        <div class="scroller" id="trending-list"></div>
    </section>

    <section class="row">
        <h2 class="row-title">Latest Anime</h2>
        <div class="scroller" id="anime-list"></div>
    </section>

    <section class="row">
        <h2 class="row-title">Blockbuster Movies</h2>
        <div class="scroller" id="movie-list"></div>
    </section>

    <section class="row">
        <h2 class="row-title">K-Drama Series</h2>
        <div class="scroller" id="kdrama-list"></div>
    </section>

    <section class="row">
        <h2 class="row-title">K-Pop World</h2>
        <div class="scroller" id="kpop-list"></div>
    </section>
</main>

<div id="details-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div id="modal-player-container" class="player-container">
          <iframe id="modal-video-iframe" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
          <div class="player-controls">
              <button onclick="enterCinemaMode()"><i class="fa-solid fa-expand"></i> Cinema Mode</button>
          </div>
      </div>
      <div class="modal-info">
        <h2 id="modal-title"></h2>
        <div class="modal-meta">
            <span id="modal-year"></span>
            <span class="age-rating">18+</span>
            <span id="modal-runtime"></span>
            <span class="quality">HD</span>
        </div>
        <p id="modal-desc"></p>
        
        <div id="series-controls" style="display:none; margin-top:20px;">
            <div class="selector-group">
                <select id="season-select" onchange="loadEpisodes()"></select>
            </div>
            <div id="episode-list" class="episode-list-container"></div>
        </div>
        
        <div class="modal-row" style="margin-top:25px;">
            <h3 style="font-size:1.1rem; border-left:4px solid #e50914; padding-left:10px;">More Like This</h3>
            <div id="modal-recommendations" class="mini-recommendation-list"></div>
        </div>
        
        <div class="cast-section">
            <h4>Top Cast</h4>
            <div class="cast-scroller" id="modal-cast"></div>
        </div>
      </div>
    </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fa-solid fa-house"></i><span>Home</span></div>
  <div class="nav-item" onclick="openSearch()"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></div>
  <div class="nav-item" onclick="openMenuDrawer()"><i class="fa-solid fa-bars"></i><span>Menu</span></div>
</div>

<div id="search-overlay" class="search-overlay" style="display:none;">
    <div class="search-input-wrapper">
        <input type="text" id="searchInput" placeholder="Search movies, anime..." oninput="processSearch(this.value)">
        <i class="fa-solid fa-xmark" onclick="closeSearch()"></i>
    </div>
    <div id="search-results" class="search-results-grid"></div>
</div>

<script src="home.js"></script>
</body>
</html>
